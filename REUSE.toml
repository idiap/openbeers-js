# See: https://reuse.software/faq/#bulk-license
#
# Most annotations live here because this repository is largely generated from
# OpenAPI templates. Adding SPDX headers directly to generated files would be
# overwritten on regeneration or would require changing upstream templates.
# REUSE.toml keeps the licensing metadata stable without patching generated
# output.

version = 1


# OpenAPI source inputs and generated output
[[annotations]]
path = [
  ".generate/openapi.json",
  ".openapi-generator/*",
  ".openapi-generator-ignore",
  "README.md",
  "package.json",
  "tsconfig.json",
  "tsconfig.esm.json",
  "openapitools.json",
  "src/**",
]
precedence = "override"
SPDX-FileCopyrightText = "Copyright © 2024-2025 Idiap Research Institute <contact@idiap.ch>"
SPDX-FileContributor = "David Geissbühler <david.geissbuhler@idiap.ch>"
SPDX-License-Identifier = "Apache-2.0"

# VCS and package manager metadata
[[annotations]]
path = [
  ".git*",
  ".npmignore",
  ".vscode/*",
  "package-lock.json",
]
precedence = "override"
SPDX-FileCopyrightText = "Copyright © 2024-2025 Idiap Research Institute <contact@idiap.ch>"
SPDX-FileContributor = "David Geissbühler <david.geissbuhler@idiap.ch>"
SPDX-License-Identifier = "Apache-2.0"
